name: Submodul-Pointer im Backend aktualisieren

on:
  # Deaktiviert — Pointer-Update läuft via GitLab-Pipeline (update-backend-pointer job).
  workflow_dispatch:

jobs:
  update-pointer:
    runs-on: ubuntu-latest
    steps:
      - name: Backend-Repo auschecken
        uses: actions/checkout@v4
        with:
          repository: boehm-gipmbh/jahrbuch-generator
          token: ${{ secrets.BACKEND_PAT }}
          submodules: true

      - name: Submodul-Pointer aktualisieren
        run: |
          FRONTEND_SHA="${{ github.sha }}"
          SHORT_SHA=$(echo "$FRONTEND_SHA" | cut -c1-7)

          cd src/main/frontend
          git fetch origin
          git checkout "$FRONTEND_SHA"
          cd ../../..

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/main/frontend

          if git diff --cached --quiet; then
            echo "Kein Pointer-Update nötig (Pointer bereits aktuell)"
          else
            git commit -m "Chore: Submodul-Pointer automatisch auf Frontend ${SHORT_SHA}"
            git push
          fi
