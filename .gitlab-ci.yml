stages:
  - test
  - update-backend

test:
  stage: test
  image: node:20
  before_script:
    - npm ci
  script:
    - npm run build
    - npx eslint src/ --max-warnings=0
    - npm test -- --watchAll=false
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/

# Aktualisiert den Submodul-Pointer im Backend-Repo.
# - Feature-Branch: sucht passenden Backend-Branch anhand der ClickUp-ID und trägt Pointer dort ein.
# - Main: pusht direkt auf Backend-main (bisheriges Verhalten).
# Voraussetzung: CI/CD-Variable BACKEND_PAT = GitLab-PAT mit write_repository-Scope
#                für jamsintown/jahrbuch-generator/jahrbuch-generator.
update-backend-pointer:
  stage: update-backend
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH != "main"
  variables:
    GIT_STRATEGY: none
  script:
    - BACKEND_URL="${CI_SERVER_PROTOCOL}://oauth2:${BACKEND_PAT}@${CI_SERVER_HOST}/jamsintown/jahrbuch-generator/jahrbuch-generator.git"
    - rm -rf backend
    - git clone --no-recurse-submodules "$BACKEND_URL" backend
    - cd backend
    - git config user.name "gitlab-ci[bot]"
    - git config user.email "gitlab-ci[bot]@noreply.local"
    - |
      if [ "$CI_COMMIT_BRANCH" != "main" ]; then
        CLICKUP_ID=$(echo "$CI_COMMIT_BRANCH" | sed -n 's|^[^/]*/\([a-z0-9]*\)-.*|\1|p')
        PREFIX=$(echo "$CI_COMMIT_BRANCH" | cut -d/ -f1)
        if [ -n "$CLICKUP_ID" ]; then
          BACKEND_BRANCH=$(git ls-remote --heads origin "${PREFIX}/${CLICKUP_ID}-*" | head -1 | sed 's|.*refs/heads/||')
        fi
        if [ -n "$BACKEND_BRANCH" ]; then
          echo "Passender Backend-Branch gefunden: $BACKEND_BRANCH"
          git checkout "$BACKEND_BRANCH"
        else
          echo "Kein passender Backend-Branch gefunden — kein Update."
          exit 0
        fi
      fi
    - |
      SHORT_SHA=$(echo "$CI_COMMIT_SHA" | cut -c1-7)
      TARGET_BRANCH=${BACKEND_BRANCH:-main}
      if [ "$TARGET_BRANCH" = "main" ]; then
        # Protected branch: GitLab Submodule API verwenden (kein direkter git push nötig)
        ENCODED_PROJECT="jamsintown%2Fjahrbuch-generator%2Fjahrbuch-generator"
        ENCODED_SUBMODULE="src%2Fmain%2Ffrontend"
        HTTP_STATUS=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
          --request PUT \
          --header "PRIVATE-TOKEN: ${BACKEND_PAT}" \
          --header "Content-Type: application/json" \
          --data "{\"branch\":\"main\",\"commit_sha\":\"${CI_COMMIT_SHA}\",\"commit_message\":\"chore: Submodul-Pointer auf Frontend ${SHORT_SHA}\"}" \
          "${CI_SERVER_URL}/api/v4/projects/${ENCODED_PROJECT}/repository/submodules/${ENCODED_SUBMODULE}")
        echo "API-Antwort (HTTP ${HTTP_STATUS}):"
        cat /tmp/api_response.json
        if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
          echo "Fehler: Submodul-Pointer konnte nicht aktualisiert werden"
          exit 1
        fi
        echo "Submodul-Pointer erfolgreich auf ${SHORT_SHA} gesetzt"
      else
        git submodule init
        git config submodule.src/main/frontend.url "${CI_SERVER_PROTOCOL}://oauth2:${BACKEND_PAT}@${CI_SERVER_HOST}/jamsintown/jahrbuch-generator/jahrbuch-generator-frontend.git"
        git submodule update
        git -C src/main/frontend fetch origin
        git -C src/main/frontend checkout "$CI_COMMIT_SHA"
        git add src/main/frontend
        if git diff --cached --quiet; then
          echo "Kein Pointer-Update nötig (Pointer bereits aktuell)"
        else
          git commit -m "chore: Submodul-Pointer auf Frontend ${SHORT_SHA}"
          git pull --rebase "$BACKEND_URL" "$TARGET_BRANCH"
          git push "$BACKEND_URL" "HEAD:${TARGET_BRANCH}"
        fi
      fi
